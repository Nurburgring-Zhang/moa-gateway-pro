routing:
  thresholds:
    trivial_length: 10
    simple_length: 50
    medium_length: 200
    complex_length: 500
  tier_mapping:
    trivial: free
    simple: lite
    medium: standard
    complex: premium
    expert: flagship
  max_cost_per_request: 1.0
  max_retries: 3
moa:
  enabled: true
  default_preset: balanced
  reference_models: 4
  aggregator: ''
  critic_rounds: 1
  reference_timeout: 60
  aggregator_timeout: 120
  consensus_threshold: 0.35
  presets:
    fast:
      enabled: true
      strategy: single
      reference_count: 1
      aggregator: ''
      critic_rounds: 0
      reference_temperature: 0.5
      aggregator_temperature: 0.5
      tier: lite
      description: 单 lite 模型,最快最便宜
    balanced:
      enabled: true
      strategy: parallel
      reference_count: 4
      aggregator_tier: premium
      critic_rounds: 1
      reference_temperature: 0.6
      aggregator_temperature: 0.4
      description: 4 模型并行 + 旗舰聚合 + 1 互审
    quality:
      enabled: true
      strategy: parallel
      reference_count: 5
      aggregator_tier: flagship
      critic_rounds: 2
      reference_temperature: 0.6
      aggregator_temperature: 0.3
      description: 5 模型 + 旗舰聚合 + 2 互审
    chinese_battalion:
      enabled: true
      strategy: parallel
      reference_models:
      - id: deepseek-v3
        role: ''
      - id: glm-4-plus
        role: ''
      - id: moonshot-v1-8k
        role: ''
      - id: qwen-plus
        role: ''
      aggregator: glm-4-plus
      aggregator_tier: premium
      critic_rounds: 1
      reference_temperature: 0.6
      aggregator_temperature: 0.4
      description: OpenSquilla v0.5.0 风格:4 国产模型并行 + 国产聚合,零国外旗舰
      max_tokens: 4096
    compose_analyst:
      enabled: true
      strategy: compose
      reference_count: 4
      aggregator_tier: premium
      critic_rounds: 0
      reference_temperature: 0.6
      aggregator_temperature: 0.4
      description: 4 模型分工:feasibility / performance / security / ux
      max_tokens: 4096
    judge:
      enabled: true
      strategy: judge
      aggregator_tier: premium
      critic_rounds: 3
      reference_temperature: 0.5
      aggregator_temperature: 0.3
      description: 单模型多轮反思,适合预算紧张但需要质量的场景
      max_tokens: 4096
    chain_deep:
      enabled: true
      strategy: chain
      stages:
      - name: research
        tier: standard
      - name: analyze
        tier: premium
      - name: summarize
        tier: premium
      reference_temperature: 0.6
      aggregator_temperature: 0.4
      description: 3 步串行 MoA,适合长链路调研分析
      max_tokens: 4096
    pipeline:
      enabled: true
      strategy: pipeline
      stages:
      - name: planner
        tier: premium
      - name: generator
        tier: standard
      - name: evaluator
        tier: premium
      description: planner → generator → evaluator 单线流程
      max_tokens: 4096
    chinese_battalion_layered:
      enabled: true
      strategy: layered
      reference_count: 4
      reference_models:
      - id: deepseek-v3
        role: ''
      - id: glm-4-plus
        role: ''
      - id: moonshot-v1-8k
        role: ''
      - id: qwen-plus
        role: ''
      aggregator: glm-4-plus
      aggregator_tier: premium
      layer_count: 3
      reference_temperature: 0.6
      aggregator_temperature: 0.4
      description: Together AI MoA 3 层架构:4 国产 L1 并行 → L2 同批模型聚合 → L3 旗舰聚合
      max_tokens: 4096
    chinese_battalion_lite:
      enabled: true
      strategy: layered
      reference_count: 3
      reference_models:
      - id: deepseek-v3
        role: ''
      - id: qwen-plus
        role: ''
      - id: glm-4-plus
        role: ''
      aggregator: glm-4-plus
      aggregator_tier: premium
      layer_count: 2
      reference_temperature: 0.6
      aggregator_temperature: 0.4
      description: Together AI MoA-Lite:2 层 MoA,1.8% 提升 + 成本最优
      max_tokens: 4096
    qwen_single_proposer:
      enabled: true
      strategy: single_proposer
      reference_count: 4
      reference_models:
      - id: qwen-plus
        role: ''
      aggregator: qwen-plus
      aggregator_tier: premium
      reference_temperature: 0.7
      description: Single-Proposer:Qwen-Plus 高温采样 4 次再聚合(论文对照组)
      max_tokens: 4096
    ranker_qwen110b:
      enabled: true
      strategy: ranker
      reference_count: 4
      aggregator: qwen-max
      aggregator_tier: premium
      reference_temperature: 0.6
      description: LLM Ranker baseline:并行 4 参考 + 旗舰选最佳(论文 §3.3 对照组)
      max_tokens: 4096
health:
  interval_seconds: 30
  timeout_seconds: 10
  failure_threshold: 3
  cooldown_seconds: 60
  healthy_recheck: 120
  # Task #43: API health management system
  enabled: true
  probe_interval_new: 600
  probe_interval_healthy: 1800
  probe_interval_degraded: 300
  probe_interval_unhealthy: 180
  purge_threshold_days: 7
  probe_timeout: 15
ratelimit:
  enabled: true
  per_key_rpm: 60
  per_key_daily_tokens: 5000000
  strategy: sliding-window
observability:
  log_dir: data/logs
  log_json: false
  metrics_enabled: true
  trace_enabled: false

# ========== Audit Logging (RBAC) ==========
audit:
  enabled: true
  format: json
  output: file
  path: data/logs/audit.jsonl
  retention_days: 90

# ========== Cache System ==========
cache:
  enabled: true
  exact_max_size: 10000
  exact_ttl: 3600
  similarity_threshold: 0.95
  semantic_max_size: 5000
  semantic_ttl: 86400
  redis_url: null
  redis_prefix: "moa:cache:"
  null_entry_ttl: 30
  ttl_jitter_pct: 0.1
  skip_streaming: true

# === Discovery System ===
discovery:
  enabled: true
  refresh_interval_hours: 24
  auto_configure: true
  first_run_delay_seconds: 60
  platforms: []
  api_keys:
    groq: ""
    openrouter: ""
    gemini: ""
    mistral: ""
    cohere: ""
    deepseek: ""
    nvidia_nim: ""
    huggingface: ""
    siliconflow: ""
    zhipu: ""
    cerebras: ""
    sambanova: ""
    github_models: ""
    cloudflare_ai: ""
    chutes: ""
    # Domestic AI model companies
    moonshot: ""
    baichuan: ""
    lingyiwanwu: ""
    stepfun: ""
    minimax: ""
    baai: ""
    qwen: ""
    # Domestic IT giants / cloud
    baidu_ernie: ""
    hunyuan: ""
    hw_pangu: ""
    doubao: ""
    iflytek: ""
    sensetime: ""
    tiangong: ""
    # Domestic API aggregators
    modelscope: ""
    # Domestic telecom operators
    china_mobile_wuyan: ""
    china_telecom_xingchen: ""
    china_unicom_yuanjing: ""
    # Multimodal specialists
    kling: ""
    cogview: ""
    wanx: ""
    minimax_music: ""
    tiangong_music: ""
  multimodal_enabled: true

# === Prompt Templates ===
prompt_templates:
  enabled: true
  custom_dir: "~/.moa-gateway/prompts"
  categories:
    - programming
    - writing
    - analysis
    - translation
    - summarization
    - creative
    - qa

# === Parameter Templates ===
param_templates:
  enabled: true

# === Agent Loop ===
agent_loop:
  default_loop: react
  max_iterations: 10
  default_tools:
    - web_search
    - code_execute
    - file_read
    - file_list
    - analyze_data

# === Benchmark System ===
benchmark:
  enabled: true
  interval_seconds: 3600
  max_concurrent: 5
  probe_timeout: 30

# === Optimizer System ===
optimizer:
  enabled: true
  daily_optimization: true
  max_experiments: 50
  convergence_threshold: 0.95
  test_cases_per_round: 3
