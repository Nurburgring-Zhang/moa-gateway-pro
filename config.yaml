server:
  host: 0.0.0.0
  port: 8910
  workers: 1
  log_level: INFO
  # SEC-010: CORS 配置警告
  # ━━ 生产环境必须修改 ━━
  # '*' 仅适用于开发环境。生产部署时必须替换为精确的域名，如:
  # cors_origins: ["https://your-domain.com", "https://admin.your-domain.com"]
  # 否则将存在跨站请求伪造 (CSRF) 和数据泄露风险。
  cors_origins:
  - '*'
storage:
  db_path: data/config.db
  log_retention_days: 30
  # ━━ 数据库后端配置 ━━
  # 默认 SQLite (零配置,适合开发/测试):
  #   database_url: ""  (使用 db_path)
  # PostgreSQL (生产环境,高并发):
  #   database_url: "postgresql+psycopg2://moa:password@localhost:5432/moa_gateway"
  # 或通过环境变量: export DATABASE_URL="postgresql+psycopg2://..."
  database_url: ""
  # 连接池参数 (仅 PostgreSQL 生效)
  db_pool_size: 20
  db_max_overflow: 10
  db_pool_timeout: 30
  db_pool_recycle: 3600
auth:
  gateway_api_keys:
  - demo-key-please-change
  admin_username: admin
  # 修26: 安全加固 — 启动前必须显式设置,不能用默认 'admin' / 空
  # 推荐用环境变量覆盖: export MOA_ADMIN_PASSWORD='YourStrong#Pass1'
  admin_password: ''
  jwt_secret: ''
  jwt_expire_minutes: 1440
