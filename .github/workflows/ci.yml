name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same branch on new pushes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============ Lint (fast gate) ============
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: |
          ruff check moa_gateway/ --output-format=github
      - name: Check formatting
        run: |
          ruff format --check moa_gateway/

  # ============ Type check ============
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install mypy
        run: pip install mypy pydantic
      - name: Run mypy
        # Non-blocking for now — will tighten as codebase improves
        run: |
          mypy moa_gateway/ || echo "::warning::mypy errors found (non-blocking)"

  # ============ Unit tests ============
  test:
    name: pytest (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          MOA_ADMIN_PASSWORD: "CI#TestPass#2024"
          PYTHONPATH: .
          PYTHONIOENCODING: "utf-8"
        run: |
          # Import smoke test
          python -c "from moa_gateway.server import app; print('import OK')"
          # Pytest
          python -m pytest moa_gateway/capability/tests/ -q --tb=short

  # ============ Security audit ============
  audit:
    name: 敏感信息审计
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 默认凭证扫描
        run: |
          echo "=== admin_password 不应含 'admin' 默认值 ==="
          ! grep -rn "admin_password:\s*['\"]*admin['\"]*\b" moa_gateway/ config.yaml 2>/dev/null || (echo "::error::admin_password default found" && exit 1)
          echo "=== 不应包含 ctx.api_key 模板打印 ==="
          ! grep -rn "ctx\.api_key" moa_gateway/ || (echo "::error::ctx.api_key print found" && exit 1)
          echo "=== 不应包含 sk- 前缀真 key ==="
          if grep -rEn "sk-[a-zA-Z0-9]{20,}" moa_gateway/ scripts/ config.yaml 2>/dev/null; then
            echo "::error::real sk- key found in source"
            exit 1
          fi
          echo "=== 不应追踪 secret 文件 ==="
          if git ls-files | grep -E "\.(fernet_key|jwt_secret)$"; then
            echo "::error::secret file tracked"
            exit 1
          fi
          echo "=== 不应追踪 .db 文件 ==="
          if git ls-files | grep -E "\.db$|\.db-journal$"; then
            echo "::error::db file tracked"
            exit 1
          fi
          echo "✓ 全部通过"
