# Alembic Configuration for MoA Gateway Pro
# Database migration support (SQLite + PostgreSQL)

[alembic]
script_location = moa_gateway/migrations
prepend_sys_path = .

# DATABASE_URL is loaded from environment at runtime
# SQLite default: sqlite:///./data/config.db
# PostgreSQL:     postgresql+psycopg2://user:pass@localhost:5432/moa_gateway
sqlalchemy.url = sqlite:///./data/config.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
