# MoA Gateway Pro Prometheus 配置
# scrape 间隔 15s, 保留 30 天

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'moa-gateway-prod'
    service: 'moa-gateway-pro'

scrape_configs:
  - job_name: 'moa-gateway-pro'
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - '127.0.0.1:8088'  # 本地开发
        labels:
          env: 'dev'
          instance_type: 'primary'

  # 预留: 多副本部署
  # - job_name: 'moa-gateway-pro-cluster'
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets:
  #         - 'moa-gw-1:8088'
  #         - 'moa-gw-2:8088'
  #         - 'moa-gw-3:8088'
  #       labels:
  #         cluster: 'production'
  #         env: 'prod'

# 告警规则
rule_files:
  - 'alerts.yml'

